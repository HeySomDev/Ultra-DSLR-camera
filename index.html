<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>গ্লাস ক্যামেরা</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 9999px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .mode-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            pointer-events: all;
        }

        .mode-pill {
            padding: 6px 16px;
            font-size: 13.5px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-options {
            position: absolute;
            top: 42px;
            right: 0;
            background: rgba(20, 20, 20, 0.96);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 8px 0;
            width: 165px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .mode-option {
            padding: 9px 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-option:hover,
        .mode-option.active {
            background: rgba(255,255,255,0.12);
        }

        .sub-option {
            padding: 7px 20px;
            font-size: 12.5px;
            color: rgba(255,255,255,0.75);
            cursor: pointer;
        }

        .sub-option:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .reset-option {
            padding: 10px 20px;
            font-size: 13px;
            color: #ff6b6b;
            cursor: pointer;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 6px;
        }

        .reset-option:hover {
            background: rgba(255, 107, 107, 0.15);
        }

        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 50px;
            z-index: 10;
            pointer-events: all;
        }

        .capture-btn {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            border: 6px solid #fff;
            box-shadow: 0 0 0 10px rgba(255, 255, 255, 0.25);
            cursor: pointer;
            transition: transform 0.2s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .capture-btn:active {
            transform: scale(0.92);
        }

        .side-btn {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .side-btn:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.95);
        }

        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.15s;
        }

        .preview {
            position: fixed;
            top: 25px;
            left: 25px;
            width: 85px;
            height: 120px;
            border-radius: 18px;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 20;
        }

        .preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .timer {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 72px;
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.7);
            z-index: 30;
            display: none;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    
    <div class="overlay">
        <!-- Mode Selector -->
        <div class="mode-selector glass">
            <div class="mode-pill" id="currentMode" onclick="toggleModeMenu()">
                HD
            </div>
            
            <div class="mode-options" id="modeOptions">
                <div class="mode-option active" onclick="setQualityMode(0)">HD</div>
                <div class="mode-option" onclick="setQualityMode(1)">Ultra HD</div>
                <div class="mode-option" onclick="setQualityMode(2)">DSLR</div>
                
                <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 6px 12px;"></div>
                
                <div class="sub-option" onclick="toggleHDR(this)">HDR</div>
                <div class="sub-option" onclick="togglePortrait(this)">Portrait</div>
                
                <div class="reset-option" onclick="resetSettings()">
                    সেটিংস রিসেট করুন
                </div>
            </div>
        </div>

        <!-- Preview -->
        <div id="preview" class="preview">
            <img id="thumb" src="" alt="">
        </div>

        <!-- Timer -->
        <div id="timer" class="timer">3</div>

        <!-- Bottom Controls -->
        <div class="controls">
            <div class="side-btn glass" onclick="switchCamera()" title="ক্যামেরা সুইচ">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h6v6"></path>
                    <path d="M9 21H3v-6"></path>
                    <path d="M21 3L3 21"></path>
                </svg>
            </div>

            <div id="captureBtn" class="capture-btn" onclick="capturePhoto()"></div>

            <div class="side-btn glass" onclick="toggleGallery()" title="গ্যালারি">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </div>
        </div>
    </div>

    <div id="flash" class="flash"></div>
    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        let stream = null;
        let currentCamera = 'environment';
        let currentQuality = 0;
        let isHDR = false;
        let isPortrait = false;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const preview = document.getElementById('preview');
        const thumb = document.getElementById('thumb');
        const timerEl = document.getElementById('timer');
        const currentModeEl = document.getElementById('currentMode');
        const modeOptions = document.getElementById('modeOptions');

        const qualityModes = ['HD', 'Ultra HD', 'DSLR'];

        /** ক্যামেরা এনহ্যান্সমেন্ট ইঞ্জিন — অনেক শক্তিশালী করা হয়েছে */
        const CAMERA_PRESETS = {
            0: { 
                filter: "contrast(112%) brightness(105%) saturate(118%)",
                name: "HD"
            },
            1: { 
                filter: "contrast(122%) brightness(108%) saturate(130%)",
                name: "Ultra HD"
            },
            2: { 
                filter: "contrast(135%) saturate(145%) brightness(110%) sharpness(1.4)",
                name: "DSLR"
            }
        };

        async function startCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());

            let width = currentQuality === 2 ? 1920 : currentQuality === 1 ? 1440 : 1280;
            let height = currentQuality === 2 ? 1080 : currentQuality === 1 ? 1080 : 720;

            if (isPortrait) [width, height] = [height, width];

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: currentCamera,
                        width: { ideal: width },
                        height: { ideal: height }
                    }
                });
                video.srcObject = stream;
                await video.play();
            } catch (err) {
                console.error(err);
                alert("ক্যামেরা চালু করতে সমস্যা হয়েছে।");
            }
        }

        function switchCamera() {
            currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
            startCamera();
        }

        function toggleModeMenu() {
            modeOptions.style.display = modeOptions.style.display === 'block' ? 'none' : 'block';
        }

        function setQualityMode(mode) {
            currentQuality = mode;
            currentModeEl.textContent = qualityModes[mode];
            startCamera();
        }

        function toggleHDR(el) {
            isHDR = !isHDR;
            el.style.color = isHDR ? '#4ade80' : 'rgba(255,255,255,0.75)';
        }

        function togglePortrait(el) {
            isPortrait = !isPortrait;
            el.style.color = isPortrait ? '#4ade80' : 'rgba(255,255,255,0.75)';
            startCamera();
        }

        function processCapture(canvas, modeIndex) {
            const preset = CAMERA_PRESETS[modeIndex] || CAMERA_PRESETS[0];
            
            // Heavy Enhancement
            ctx.filter = preset.filter;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Stronger Cinematic Vignette + Depth
            const gradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, canvas.width/3.5,
                canvas.width/2, canvas.height/2, canvas.width*1.15
            );
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(1, 'rgba(0,0,0,0.45)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Extra micro-contrast & sharpness boost
            ctx.filter = 'contrast(108%) saturate(112%)';
            ctx.drawImage(canvas, 0, 0);
            
            ctx.filter = 'none';
        }

        async function capturePhoto() {
            if (!stream) return;

            flash.style.opacity = '0.75';
            setTimeout(() => flash.style.opacity = '0', 120);

            timerEl.style.display = 'block';
            for (let i = 3; i >= 1; i--) {
                timerEl.textContent = i;
                await new Promise(r => setTimeout(r, 450));
            }
            timerEl.style.display = 'none';

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            processCapture(canvas, currentQuality);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.98);
            
            thumb.src = dataUrl;
            preview.style.display = 'block';

            const link = document.createElement('a');
            link.download = `GlassCam_\( {CAMERA_PRESETS[currentQuality].name} \){isHDR ? '_HDR' : ''}\( {isPortrait ? '_Portrait' : ''}_ \){new Date().getTime()}.jpg`;
            link.href = dataUrl;
            link.click();

            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
        }

        function resetSettings() {
            currentQuality = 0;
            isHDR = false;
            isPortrait = false;
            currentModeEl.textContent = 'HD';
            modeOptions.style.display = 'none';
            
            document.querySelectorAll('.sub-option').forEach(opt => {
                opt.style.color = 'rgba(255,255,255,0.75)';
            });
            
            startCamera();
            alert("সব সেটিংস রিসেট করা হয়েছে");
        }

        function toggleGallery() {
            alert("গ্যালারি খুলছে...\n(ছবি অটো ডাউনলোড হয়েছে)");
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.mode-selector')) {
                modeOptions.style.display = 'none';
            }
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => {
            if (Math.abs(e.changedTouches[0].screenX - touchStartX) > 120) {
                switchCamera();
            }
        });

        window.onload = () => {
            startCamera();
            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
